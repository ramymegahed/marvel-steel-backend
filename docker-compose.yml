version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: marvel_steel_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: marvel_steel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d marvel_steel"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: marvel_steel_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secret123@db:5432/marvel_steel
      - JWT_SECRET=change-this-jwt-secret-in-production
    volumes:
      - .:/app  # Live reloading enabled by mounting local folder to /app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
